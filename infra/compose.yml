services:
  redis:
    image: redis:8.8.0-alpine
    container_name: lang-clips-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      sh -c "redis-server --requirepass $${REDIS_PASSWORD:-}"
    env_file:
      - .env
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
